<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loacker blog</title>
    <style>
        /* Hugo Terminal Theme Vibes */
        :root {
            --bg-color: #1a1c1d;
            --text-color: #a9b7c6;
            --accent-color: #26a269; /* Terminal Green */
            --link-color: #62a0ea;   /* Terminal Blue */
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            line-height: 1.6;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px dashed var(--accent-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        header h1 a {
            color: var(--accent-color);
            text-decoration: none;
        }

        header h1 a::before {
            content: "$ "; /* Simulates a terminal prompt */
        }

        article {
            margin-bottom: 3rem;
            padding: 1rem;
            border: 1px solid #2a2a2a;
            background-color: #151515;
            border-radius: 4px;
        }

        time {
            display: block;
            color: #7a7a7a;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        time::before {
            content: "[date] ";
        }

        h2 a {
            color: var(--link-color);
            text-decoration: none;
        }

        h2 a:hover {
            text-decoration: underline;
            background-color: rgba(98, 160, 234, 0.1);
        }

        p {
            margin-top: 0.5rem;
            color: #e0e0e0;
        }
        /* Cursor blink effect just like the real theme */
        header h1::after {
            content: "█";
            animation: blink 1s infinite;
            color: var(--accent-color);
            margin-left: 5px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1><a href="/">loacker blog</a></h1>
    </header>

    <main>
        {% for post in posts %}
            <article>
                <time datetime="{{ post.published_date|date:'Y-m-d H:i' }}">
                    {{ post.published_date|date:"d.m.Y, H:i" }}
                </time>
                <h2>
                    <a href="{% url 'post_detail' pk=post.pk %}">{{ post.title }}</a>
                </h2>
                <p>{{ post.text|linebreaksbr }}</p>
            </article>
        {% empty %}
            <p>No posts found. Type 'git commit' something... Just kidding, add a post via admin!</p>
        {% endfor %}
    </main>

</body>
</html>
